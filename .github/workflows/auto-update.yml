name: Auto Update DEKMA Results
on:
  schedule:
    # Runs at 8am, 12pm, 4pm, and 8pm Sri Lanka time (UTC+5:30)
    # Skips the dead hours — no late-night or early-morning wasted runs
    - cron: "30 2 * * *"   #  8:00 AM SL
    - cron: "30 6 * * *"   # 12:00 PM SL
    - cron: "30 10 * * *"  #  4:00 PM SL
    - cron: "30 14 * * *"  #  8:00 PM SL
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Run downloader
        run: python xml_downloader_auto.py
      - name: Run parser
        run: python parse_results.py
      - name: Commit and push if changes exist
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update: new XML and rebuilt results.js"
            git push
          fi
