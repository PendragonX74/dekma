name: Auto Update DEKMA Results

on:
  schedule:
    - cron: "30 2 * * *"    # 8:00 AM SL
    - cron: "30 6 * * *"    # 12:00 PM SL
    - cron: "30 10 * * *"   # 4:00 PM SL
    - cron: "30 14 * * *"   # 8:00 PM SL
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run XML downloader
        id: download
        run: |
          python xml_downloader_auto.py

          if [ -f "DEKMA RESULTS/.new_downloads" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run parser
        if: steps.download.outputs.changed == 'true'
        run: python parse_results.py

      - name: Commit and push if changes exist
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update: new XML and rebuilt results"
            git push
          fi
