name: Auto Update DEKMA Results
on:
  schedule:
    - cron: "30 0 * * *"   # 08:30 SGT
    - cron: "30 1 * * *"   # 09:30 SGT
    - cron: "30 2 * * *"   # 10:30 SGT
    - cron: "30 3 * * *"   # 11:30 SGT
    - cron: "30 4 * * *"   # 12:30 SGT
    - cron: "30 5 * * *"   # 13:30 SGT
    - cron: "30 6 * * *"   # 14:30 SGT
    - cron: "30 7 * * *"   # 15:30 SGT
    - cron: "30 8 * * *"   # 16:30 SGT
    - cron: "30 9 * * *"   # 17:30 SGT
    - cron: "30 10 * * *"  # 18:30 SGT
    - cron: "30 11 * * *"  # 19:30 SGT
    - cron: "30 12 * * *"  # 20:30 SGT
    - cron: "30 13 * * *"  # 21:30 SGT
    # No runs from 22:00–08:00 SGT (quiet hours)
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests
      - name: Run downloader
        id: download
        run: |
          python xml_downloader_auto.py
          if [ -f "DEKMA RESULTS/.new_downloads" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run parser
        if: steps.download.outputs.changed == 'true'
        run: python parse_results.py
      - name: Commit and push if changes exist
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update: new XML and rebuilt results"
            git push
          fi
